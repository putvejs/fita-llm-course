<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Direct Payments — Analysis Report</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root { --c0:#4C72B0;--c1:#DD8452;--c2:#55A868;--c3:#C44E52;--c4:#8172B3;--c5:#937860;--c6:#DA8BC3;--c7:#8C8C8C; }
  body { background:#f0f2f5; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }

  header { background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); color:#fff; padding:24px 32px; }
  header h1 { font-size:1.5rem; font-weight:700; margin:0; }
  header p  { opacity:.6; font-size:.83rem; margin:4px 0 0; }

  #filter-bar { background:#fff; border-bottom:1px solid #e0e0e0; padding:12px 24px;
                position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  #filter-bar label { font-size:.75rem; font-weight:600; color:#555; margin-bottom:2px; }
  #filter-bar .form-select, #filter-bar .form-control { font-size:.82rem; }

  .stat-card { background:#fff; border-radius:10px; padding:16px 20px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .stat-card .label { font-size:.72rem; color:#888; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .stat-card .value { font-size:1.55rem; font-weight:700; color:#1a1a2e; line-height:1.2; }

  .chart-section { background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.06); overflow:hidden; display:flex; flex-direction:column; }
  .section-meta { padding:18px 22px 0; }
  .section-title { font-size:.8rem; font-weight:700; color:#1a1a2e; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
  .section-desc { font-size:.76rem; color:#999; line-height:1.55; margin-bottom:10px; }

  .chart-wrapper { position:relative; height:280px; padding:8px 18px 16px; }
  .chart-wrapper.tall { height:360px; }

  .insights-panel { border-top:1px solid #eef0f8; background:#f6f8ff; padding:12px 20px 14px; }
  .insights-label { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#4C72B0; margin-bottom:8px; }
  .insights-panel ul { margin:0; padding-left:14px; font-size:.76rem; color:#555; line-height:1.6; }
  .insights-panel li { margin-bottom:5px; }
  .insights-panel li:last-child { margin-bottom:0; }
  .insights-panel strong { color:#222; }

  #loading { position:fixed; top:0; left:0; right:0; height:3px;
             background:linear-gradient(90deg,var(--c0),var(--c2)); z-index:9999;
             display:none; animation:slide 1.2s infinite; }
  @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
</style>
</head>
<body>

<div id="loading"></div>

<header>
  <h1>Direct Payments — Analysis Report</h1>
  <p>Live data &nbsp;·&nbsp; 431 organisations &nbsp;·&nbsp; 9,381 mandates &nbsp;·&nbsp; 33,461 payments &nbsp;·&nbsp; Mar 2018 – Mar 2020</p>
</header>

<div id="filter-bar">
  <div class="d-flex flex-wrap align-items-end gap-3">
    <div>
      <label>Currency</label>
      <select id="f-currency" class="form-select form-select-sm" style="width:90px">
        <option value="ALL">All</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
      </select>
    </div>
    <div>
      <label>Vertical</label>
      <select id="f-vertical" class="form-select form-select-sm" style="min-width:200px">
        <option value="ALL">All verticals</option>
      </select>
    </div>
    <div>
      <label>Source</label>
      <select id="f-source" class="form-select form-select-sm" style="width:120px">
        <option value="ALL">All sources</option>
      </select>
    </div>
    <div>
      <label>From</label>
      <input id="f-start" type="month" class="form-control form-control-sm" style="width:140px">
    </div>
    <div>
      <label>To</label>
      <input id="f-end" type="month" class="form-control form-control-sm" style="width:140px">
    </div>
    <button id="f-reset" class="btn btn-sm btn-outline-secondary">Reset</button>
  </div>
</div>

<div class="container-fluid px-4 py-4" style="max-width:1400px">

  <!-- Summary stats -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md"><div class="stat-card"><div class="label">Payments</div><div class="value" id="stat-payments">—</div></div></div>
    <div class="col-6 col-md"><div class="stat-card"><div class="label">Revenue</div><div class="value" id="stat-revenue">—</div></div></div>
    <div class="col-6 col-md"><div class="stat-card"><div class="label">Avg Payment</div><div class="value" id="stat-avg">—</div></div></div>
    <div class="col-6 col-md"><div class="stat-card"><div class="label">Active Orgs</div><div class="value" id="stat-orgs">—</div></div></div>
    <div class="col-6 col-md"><div class="stat-card"><div class="label">Active Mandates</div><div class="value" id="stat-mandates">—</div></div></div>
  </div>

  <!-- Chart sections injected here -->
  <div id="charts-container"></div>

</div>

<script>
const C = ['#4C72B0','#DD8452','#55A868','#C44E52','#8172B3','#937860','#DA8BC3','#8C8C8C'];
const FMT_GBP  = v => '£' + Number(v).toLocaleString('en', {minimumFractionDigits:0, maximumFractionDigits:0});
const FMT_GBP2 = v => '£' + Number(v).toFixed(2);
const FMT_NUM  = v => Number(v).toLocaleString();

const charts = {};
let _minMonth, _maxMonth;

// ── Chart helpers ─────────────────────────────────────────────────────────────

function upsert(id, config) {
  const el = document.getElementById(id);
  if (!el) return;
  if (charts[id]) {
    charts[id].data.labels = config.data.labels;
    config.data.datasets.forEach((ds, i) => {
      if (charts[id].data.datasets[i]) charts[id].data.datasets[i].data = ds.data;
    });
    charts[id].update('active');
  } else {
    charts[id] = new Chart(el, config);
  }
}

const baseOpts = (extra = {}) => ({
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } } },
  ...extra,
});

// ── Filter helpers ────────────────────────────────────────────────────────────

function getFilters() {
  return {
    currency: document.getElementById('f-currency').value,
    vertical: document.getElementById('f-vertical').value,
    source:   document.getElementById('f-source').value,
    start:    document.getElementById('f-start').value,
    end:      document.getElementById('f-end').value,
  };
}

function buildQS(overrides = {}) {
  const f = { ...getFilters(), ...overrides };
  const p = new URLSearchParams();
  Object.entries(f).forEach(([k, v]) => { if (v && v !== 'ALL') p.set(k, v); });
  return p.toString();
}

// ── Content helpers ───────────────────────────────────────────────────────────

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderInsights(text) {
  if (!text) return '';
  const bullets = text.split('\n\n').map(b => b.trim()).filter(b => b.startsWith('- '));
  const items = bullets.map(b => {
    const html = b.slice(2).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    return `<li>${html}</li>`;
  }).join('');
  return `<div class="insights-label">AI Insights &nbsp;·&nbsp; full dataset</div><ul>${items}</ul>`;
}

// ── Chart render configs (indexed by plan item) ───────────────────────────────

const CHART_CONFIG = [
  // 0: Monthly Revenue & Payment Volume Growth
  {
    endpoint: '/api/revenue-over-time',
    tall: true,
    render(id, rows) {
      upsert(id, {
        type: 'line',
        data: {
          labels: rows.map(r => r.month),
          datasets: [
            { label: 'Revenue', data: rows.map(r => r.revenue),
              borderColor: C[0], backgroundColor: C[0]+'22', fill: true, tension: 0.3, yAxisID: 'y' },
            { label: 'Payments', data: rows.map(r => r.payment_count),
              borderColor: C[1], backgroundColor: 'transparent',
              borderDash: [5,3], tension: 0.3, yAxisID: 'y2' },
          ],
        },
        options: baseOpts({
          interaction: { mode: 'index', intersect: false },
          scales: {
            y:  { position: 'left',  ticks: { callback: FMT_GBP  }, grid: { color: '#f0f0f0' } },
            y2: { position: 'right', ticks: { callback: FMT_NUM  }, grid: { drawOnChartArea: false } },
            x:  { grid: { color: '#f5f5f5' } },
          },
        }),
      });
    }
  },
  // 1: Revenue vs Payment Volume by Vertical
  {
    endpoint: '/api/revenue-by-vertical',
    render(id, rows) {
      upsert(id, {
        type: 'bar',
        data: {
          labels: rows.map(r => r.vertical),
          datasets: [
            { label: 'Revenue', data: rows.map(r => r.revenue),
              backgroundColor: C[0], yAxisID: 'y' },
            { label: 'Payments', data: rows.map(r => r.payment_count),
              type: 'line', borderColor: C[1], backgroundColor: 'transparent',
              pointBackgroundColor: C[1], tension: 0.2, yAxisID: 'y2' },
          ],
        },
        options: baseOpts({
          scales: {
            y:  { ticks: { callback: FMT_GBP }, grid: { color: '#f0f0f0' } },
            y2: { position: 'right', ticks: { callback: FMT_NUM }, grid: { drawOnChartArea: false } },
          },
        }),
      });
    }
  },
  // 2: Average Payment Value by Vertical
  {
    endpoint: '/api/avg-value-by-vertical',
    render(id, rows) {
      upsert(id, {
        type: 'bar',
        data: {
          labels: rows.map(r => r.vertical),
          datasets: [{ label: 'Avg Payment', data: rows.map(r => r.avg_amount),
                       backgroundColor: [...C].reverse() }],
        },
        options: baseOpts({
          indexAxis: 'y',
          plugins: { legend: { display: false },
            tooltip: { callbacks: { label: ctx => ' ' + FMT_GBP2(ctx.raw) } } },
          scales: { x: { ticks: { callback: FMT_GBP2 }, grid: { color: '#f0f0f0' } } },
        }),
      });
    }
  },
  // 3: Payment Source Mix
  {
    endpoint: '/api/source-breakdown',
    render(id, rows) {
      upsert(id, {
        type: 'bar',
        data: {
          labels: rows.map(r => r.source),
          datasets: [
            { label: 'Revenue', data: rows.map(r => r.revenue),
              backgroundColor: C[0], yAxisID: 'y' },
            { label: 'Avg Payment', data: rows.map(r => r.avg_amount),
              type: 'line', borderColor: C[1], backgroundColor: 'transparent',
              pointBackgroundColor: C[1], yAxisID: 'y2', tension: 0.2 },
          ],
        },
        options: baseOpts({
          scales: {
            y:  { ticks: { callback: FMT_GBP  }, grid: { color: '#f0f0f0' } },
            y2: { position: 'right', ticks: { callback: FMT_GBP2 }, grid: { drawOnChartArea: false } },
          },
        }),
      });
    }
  },
  // 4: Top 15 Organisations by Revenue
  {
    endpoint: '/api/top-orgs',
    render(id, rows) {
      const fullIds = rows.map(r => r.org_id);
      upsert(id, {
        type: 'bar',
        data: {
          labels: rows.map(r => r.org_id.substring(0, 10) + '…'),
          datasets: [{ label: 'Revenue', data: rows.map(r => r.revenue),
                       backgroundColor: C }],
        },
        options: baseOpts({
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: {
              title: items => fullIds[items[0].dataIndex],
              label: ctx => ' ' + FMT_GBP(ctx.raw),
            }},
          },
          scales: { x: { ticks: { callback: FMT_GBP }, grid: { color: '#f0f0f0' } } },
        }),
      });
    }
  },
  // 5: Mandate Productivity by Vertical
  {
    endpoint: '/api/mandate-productivity-by-vertical',
    render(id, rows) {
      upsert(id, {
        type: 'bar',
        data: {
          labels: rows.map(r => r.vertical),
          datasets: [
            { label: 'Avg Payments / Mandate', data: rows.map(r => r.avg_payments_per_mandate),
              backgroundColor: C[2], yAxisID: 'y' },
            { label: 'Mandates', data: rows.map(r => r.mandate_count),
              backgroundColor: C[0] + '66', yAxisID: 'y2' },
          ],
        },
        options: baseOpts({
          scales: {
            y:  { beginAtZero: true, grid: { color: '#f0f0f0' } },
            y2: { position: 'right', beginAtZero: true, ticks: { callback: FMT_NUM }, grid: { drawOnChartArea: false } },
          },
        }),
      });
    }
  },
  // 6: Monthly New Mandate Authorisations
  {
    endpoint: '/api/monthly-mandates',
    render(id, rows) {
      upsert(id, {
        type: 'line',
        data: {
          labels: rows.map(r => r.month),
          datasets: [{ label: 'New Mandates', data: rows.map(r => r.new_mandates),
                       borderColor: C[3], backgroundColor: C[3]+'22', fill: true, tension: 0.3 }],
        },
        options: baseOpts({
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { callback: FMT_NUM }, grid: { color: '#f0f0f0' } },
            x: { grid: { color: '#f5f5f5' } },
          },
        }),
      });
    }
  },
];

// Grid layout: which plan items share a row [indices, fullWidth?]
const ROWS = [[0], [1, 2], [3, 4], [5, 6]];

// ── DOM builder ───────────────────────────────────────────────────────────────

function buildLayout(plan) {
  const container = document.getElementById('charts-container');

  ROWS.forEach(indices => {
    const row = document.createElement('div');
    row.className = 'row g-4 mb-4';

    indices.forEach(i => {
      if (i >= plan.length) return;
      const item = plan[i];
      const cfg  = CHART_CONFIG[i];
      const full = indices.length === 1;

      const col = document.createElement('div');
      col.className = full ? 'col-12' : 'col-lg-6';

      col.innerHTML = `
        <div class="chart-section h-100">
          <div class="section-meta">
            <div class="section-title">${escapeHtml(item.title)}</div>
            <div class="section-desc">${escapeHtml(item.description)}</div>
          </div>
          <div class="chart-wrapper${cfg.tall ? ' tall' : ''}">
            <canvas id="chart-${i}"></canvas>
          </div>
          ${item.insights ? `<div class="insights-panel">${renderInsights(item.insights)}</div>` : ''}
        </div>`;

      row.appendChild(col);
    });

    container.appendChild(row);
  });
}

// ── API loaders ───────────────────────────────────────────────────────────────

async function loadSummary() {
  const d = await fetch('/api/summary?' + buildQS()).then(r => r.json());
  document.getElementById('stat-payments').textContent = FMT_NUM(d.total_payments ?? 0);
  document.getElementById('stat-revenue').textContent  = FMT_GBP(d.total_revenue   ?? 0);
  document.getElementById('stat-avg').textContent      = FMT_GBP2(d.avg_payment    ?? 0);
  document.getElementById('stat-orgs').textContent     = FMT_NUM(d.active_orgs     ?? 0);
  document.getElementById('stat-mandates').textContent = FMT_NUM(d.active_mandates ?? 0);
}

async function loadAll() {
  document.getElementById('loading').style.display = 'block';
  const qs = buildQS();
  await Promise.all([
    loadSummary(),
    ...CHART_CONFIG.map((cfg, i) =>
      fetch(cfg.endpoint + '?' + qs)
        .then(r => r.json())
        .then(rows => cfg.render('chart-' + i, rows))
    ),
  ]);
  document.getElementById('loading').style.display = 'none';
}

// ── Filters ───────────────────────────────────────────────────────────────────

let debounce;
function onFilterChange() {
  clearTimeout(debounce);
  debounce = setTimeout(loadAll, 350);
}

async function initFilters() {
  const f = await fetch('/api/filters').then(r => r.json());
  _minMonth = f.min_month;
  _maxMonth = f.max_month;

  const vSel = document.getElementById('f-vertical');
  f.verticals.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    vSel.appendChild(o);
  });

  const sSel = document.getElementById('f-source');
  f.sources.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s.charAt(0).toUpperCase() + s.slice(1);
    sSel.appendChild(o);
  });

  const fStart = document.getElementById('f-start');
  const fEnd   = document.getElementById('f-end');
  fStart.value = fStart.min = fEnd.min = f.min_month;
  fEnd.value   = fStart.max = fEnd.max = f.max_month;

  ['f-currency','f-vertical','f-source','f-start','f-end'].forEach(id =>
    document.getElementById(id).addEventListener('change', onFilterChange));

  document.getElementById('f-reset').addEventListener('click', () => {
    document.getElementById('f-currency').value = 'ALL';
    document.getElementById('f-vertical').value = 'ALL';
    document.getElementById('f-source').value   = 'ALL';
    document.getElementById('f-start').value    = _minMonth;
    document.getElementById('f-end').value      = _maxMonth;
    loadAll();
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', async () => {
  await initFilters();
  const plan = await fetch('/api/results').then(r => r.json());
  buildLayout(plan);
  await loadAll();
});
</script>
</body>
</html>
