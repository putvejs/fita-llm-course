name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r week3/requirements.txt pytest
      - name: Run tests
        run: python -m pytest week3/tests/ -v
        env:
          ANTHROPIC_API_KEY: "dummy-for-unit-tests"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f week3/Dockerfile -t week3-web .
