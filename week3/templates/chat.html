<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docker Compose Q&A</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

    header {
      background: #1a1f2e; border-bottom: 1px solid #2d3748;
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #90cdf4; }
    header span { font-size: 0.8rem; color: #718096; }

    .layout { display: flex; flex: 1; overflow: hidden; }

    /* Chat panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    .msg { display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }
    .bubble {
      max-width: 75%; padding: 10px 14px; border-radius: 12px;
      font-size: 0.9rem; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
    }
    .user .bubble { background: #2b6cb0; color: #fff; border-bottom-right-radius: 3px; }
    .assistant .bubble { background: #1a1f2e; border: 1px solid #2d3748; border-bottom-left-radius: 3px; }

    .bubble pre { background: #0f1117; border: 1px solid #2d3748; border-radius: 6px; padding: 10px; margin: 8px 0; overflow-x: auto; }
    .bubble code { font-family: 'Courier New', monospace; font-size: 0.85rem; }
    .bubble p { margin-bottom: 6px; }

    .input-row {
      padding: 16px 20px; background: #1a1f2e; border-top: 1px solid #2d3748;
      display: flex; gap: 10px;
    }
    #question { flex: 1; background: #0f1117; border: 1px solid #2d3748; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 0.9rem; resize: none; height: 46px; outline: none; }
    #question:focus { border-color: #4299e1; }
    #send-btn {
      background: #2b6cb0; color: #fff; border: none; border-radius: 8px;
      padding: 0 18px; cursor: pointer; font-size: 0.9rem; font-weight: 500;
    }
    #send-btn:disabled { opacity: 0.5; cursor: default; }
    #send-btn:hover:not(:disabled) { background: #3182ce; }

    /* Logs panel */
    .logs-panel {
      width: 340px; border-left: 1px solid #2d3748; display: flex; flex-direction: column;
      background: #0d1117;
    }
    .logs-header {
      padding: 12px 16px; border-bottom: 1px solid #2d3748; display: flex; justify-content: space-between; align-items: center;
    }
    .logs-header h2 { font-size: 0.85rem; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; }
    #refresh-btn { background: none; border: 1px solid #2d3748; color: #718096; border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; cursor: pointer; }
    #refresh-btn:hover { color: #e2e8f0; border-color: #4a5568; }
    #log-lines { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: 'Courier New', monospace; font-size: 0.72rem; line-height: 1.6; color: #718096; }
    #log-lines .log-info { color: #68d391; }
    #log-lines .log-error { color: #fc8181; }
    #log-lines .log-warn { color: #f6e05e; }

    .typing { color: #4a5568; font-style: italic; font-size: 0.85rem; }

    @media (max-width: 700px) { .logs-panel { display: none; } }
  </style>
</head>
<body>
  <header>
    <h1>Docker Compose Q&A</h1>
    <span>Powered by Claude Sonnet 4.6</span>
  </header>

  <div class="layout">
    <div class="chat-panel">
      <div id="messages">
        <div class="msg assistant">
          <div class="bubble">Hello! I'm your Docker Compose assistant. Ask me anything — from basic concepts to production patterns.

Try: <em>"How do I connect two services?"</em> or <em>"Show me a docker-compose.yml with health checks."</em></div>
        </div>
      </div>
      <div class="input-row">
        <textarea id="question" placeholder="Ask a Docker Compose question…" rows="1"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>

    <div class="logs-panel">
      <div class="logs-header">
        <h2>Logs</h2>
        <button id="refresh-btn">Refresh</button>
      </div>
      <div id="log-lines">Loading…</div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const questionEl = document.getElementById('question');
    const sendBtn = document.getElementById('send-btn');
    const logLinesEl = document.getElementById('log-lines');

    let history = [];

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderMarkdown(text) {
      // code blocks
      text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
      // inline code
      text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
      // bold
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // newlines to <br> outside pre
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = renderMarkdown(content);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function send() {
      const q = questionEl.value.trim();
      if (!q) return;

      questionEl.value = '';
      sendBtn.disabled = true;
      addMessage('user', q);

      const typingDiv = document.createElement('div');
      typingDiv.className = 'msg assistant';
      typingDiv.innerHTML = '<div class="bubble typing">Thinking…</div>';
      messagesEl.appendChild(typingDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q, history }),
        });
        const data = await res.json();
        typingDiv.remove();
        if (data.error) {
          addMessage('assistant', `Error: ${data.error}`);
        } else {
          addMessage('assistant', data.answer);
          history.push({ role: 'user', content: q });
          history.push({ role: 'assistant', content: data.answer });
          loadLogs();
        }
      } catch (e) {
        typingDiv.remove();
        addMessage('assistant', `Network error: ${e.message}`);
      }
      sendBtn.disabled = false;
      questionEl.focus();
    }

    sendBtn.addEventListener('click', send);
    questionEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    async function loadLogs() {
      try {
        const res = await fetch('/api/logs');
        const data = await res.json();
        logLinesEl.innerHTML = data.lines.map(line => {
          const cls = line.includes(' ERROR ') ? 'log-error'
                    : line.includes(' WARNING ') ? 'log-warn'
                    : 'log-info';
          return `<div class="${cls}">${escapeHtml(line)}</div>`;
        }).join('') || '<div>No logs yet.</div>';
        logLinesEl.scrollTop = logLinesEl.scrollHeight;
      } catch { logLinesEl.textContent = 'Failed to load logs.'; }
    }

    document.getElementById('refresh-btn').addEventListener('click', loadLogs);
    loadLogs();
    setInterval(loadLogs, 10000);
  </script>
</body>
</html>
